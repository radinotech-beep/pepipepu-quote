body{font-family:'Noto Sans KR',sans-serif;background:#FFFBE6;color:#2C2C2A;overflow:hidden;height:100vh;display:flex;flex-direction:column;}

/* 탑바 */

.top-logo{font-size:15px;font-weight:500;color:#111;letter-spacing:0.3px;}

/* 바디 */

.cart-head{padding:10px 12px;border-bottom:1px solid #E8D84A;font-size:12px;font-weight:500;color:#111;}

.ci-name{font-size:11px;font-weight:500;color:#2C2C2A;}
.ci-opt{font-size:10px;color:#888;margin-top:1px;}
.ci-row{display:flex;justify-content:space-between;align-items:center;margin-top:2px;}
.ci-qty-price{font-size:10px;color:#888;}

.wait-back{margin-top:30px;font-size:12px;color:#aaa;cursor:pointer;background:none;border:none;font-family:inherit;}

/* 비밀번호 모달 */
.pwd-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;align-items:center;justify-content:center;}

// ── Firebase 로드 ──
function loadData(){
  db.ref('jangbu').once('value').then(snap=>{
    const data=snap.val();
    if(data){
      const rawDepts=data.depts;
      if(rawDepts&&typeof rawDepts==='object'&&!Array.isArray(rawDepts)){
        depts=Object.values(rawDepts);
      } else {
        depts=rawDepts||[];
      }
      if(data.optionDB)optionDB=data.optionDB;
      else optionDB=[...defaultOpt];
      catOptMap=data.catOptMap||null;
      // soldout은 루트 경로에 별도 저장되므로 아래 별도 로드
    } else {
      depts=[];optionDB=[...defaultOpt];
    }
    document.getElementById('syncDot').className='sync-dot';
    initUI();
  }).catch(()=>{
    depts=[];optionDB=[...defaultOpt];
    document.getElementById('syncDot').className='sync-dot err';
    initUI();
  });

  // 품절/catOptMap/depts 실시간
  db.ref('soldout').on('value',snap=>{
    soldout=snap.val()||{};
    if(curCat)renderMenuArea(curCat);
  });
  db.ref('jangbu/catOptMap').on('value',snap=>{catOptMap=snap.val()||null;});
  db.ref('jangbu/depts').on('value',snap=>{
    const data=snap.val();
    if(!data)return;
    const newDepts=Array.isArray(data)?data:Object.values(data);
    depts=newDepts;
    renderIntroScreen();
  });

  // 주문번호 로드
  db.ref('orderCount').once('value').then(s=>{orderCount=s.val()||0;});
}

// ── 메뉴 영역 ──
function isMega(name){
  return /메가|왕/.test(name);
}

function getTemp(item){
  if(item.tempFixed==='HOT')return'HOT';
  if(item.tempFixed==='ICE')return'ICE';
  return null;
}

function renderMenuArea(catKey){
  const area=document.getElementById('menuArea');
  area.innerHTML='';
  const cat=CATEGORIES.find(c=>c.key===catKey);
  const items=menuDB.filter(m=>m.cat===catKey);

  if(cat&&Object.keys(cat.sub).length>0){
    // 서브카테고리 있는 경우
    Object.entries(cat.sub).forEach(([subName,subMenus])=>{
      const subItems=items.filter(m=>subMenus.includes(m.name));
      if(subItems.length===0)return;
      const lbl=document.createElement('div');
      lbl.className='subcat-label';lbl.textContent=subName;
      area.appendChild(lbl);
      const grid=document.createElement('div');
      grid.className='menu-grid';
      subItems.forEach(item=>grid.appendChild(makeMenuCard(item)));
      area.appendChild(grid);
    });
    // 서브에 없는 나머지
    const subAll=Object.values(cat.sub).flat();
    const rest=items.filter(m=>!subAll.includes(m.name));
    if(rest.length>0){
      const lbl=document.createElement('div');
      lbl.className='subcat-label';lbl.textContent='기타';
      area.appendChild(lbl);
      const grid=document.createElement('div');
      grid.className='menu-grid';
      rest.forEach(item=>grid.appendChild(makeMenuCard(item)));
      area.appendChild(grid);
    }
  } else {
    const grid=document.createElement('div');
    grid.className='menu-grid';
    items.forEach(item=>grid.appendChild(makeMenuCard(item)));
    area.appendChild(grid);
  }
}

function makeMenuCard(item){
  const div=document.createElement('div');
  const isSold=soldout[item.name];
  const cartQty=cart.filter(c=>c.name===item.name&&(item.needTemp||c.temp===item.tempFixed)).reduce((s,c)=>s+c.qty,0);
  div.className='menu-card'+(cartQty>0?' in-cart':'')+(isSold?' soldout':'');

  if(isSold){
    const st=document.createElement('div');st.className='sold-tag';st.textContent='품절';div.appendChild(st);
  }
  if(cartQty>0){
    const qb=document.createElement('div');qb.className='menu-cart-qty';qb.textContent=cartQty;div.appendChild(qb);
  }

  const temp=getTemp(item);
  const mega=isMega(item.name);
  const imgWrap=document.createElement('div');imgWrap.className='menu-img-wrap';
  imgWrap.textContent=item.cat==='디저트'?'🍰':item.cat==='에이드&주스'?'🧃':item.cat==='스무디&프라페'?'🧋':item.cat==='티(Tea)'?'🍵':'☕';
  div.appendChild(imgWrap);

  const nameEl=document.createElement('div');nameEl.className='menu-name';
  let displayName=item.name;
  nameEl.textContent=displayName;
  div.appendChild(nameEl);

  // 태그 (HOT/ICE/MEGA)
  const tagWrap=document.createElement('div');tagWrap.style.cssText='display:flex;gap:3px;justify-content:center;margin:2px 0;flex-wrap:wrap;';
  if(mega){
    const t=document.createElement('span');
    t.style.cssText='font-size:9px;font-weight:500;padding:1px 4px;border-radius:3px;background:#F5C800;color:#111;';
    t.textContent='MEGA';tagWrap.appendChild(t);
  }
  if(item.needTemp){
    // 통합 카드: HOT·ICE 둘 다 표시
    const th=document.createElement('span');
    th.style.cssText='font-size:9px;font-weight:500;padding:1px 4px;border-radius:3px;background:#FCEBEB;color:#A32D2D;';
    th.textContent='HOT';tagWrap.appendChild(th);
    const ti=document.createElement('span');
    ti.style.cssText='font-size:9px;font-weight:500;padding:1px 4px;border-radius:3px;background:#E6F1FB;color:#185FA5;';
    ti.textContent='ICE';tagWrap.appendChild(ti);
  } else if(temp==='HOT'){
    const t=document.createElement('span');
    t.style.cssText='font-size:9px;font-weight:500;padding:1px 4px;border-radius:3px;background:#FCEBEB;color:#A32D2D;';
    t.textContent='HOT';tagWrap.appendChild(t);
  } else if(temp==='ICE'){
    const t=document.createElement('span');
    t.style.cssText='font-size:9px;font-weight:500;padding:1px 4px;border-radius:3px;background:#E6F1FB;color:#185FA5;';
    t.textContent='ICE';tagWrap.appendChild(t);
  }
  div.appendChild(tagWrap);

  const priceEl=document.createElement('div');priceEl.className='menu-price';priceEl.textContent=item.price.toLocaleString()+'원';div.appendChild(priceEl);

  div.onclick=()=>{if(!isSold)openPopup(item);};
  return div;
}

// ── 팝업 ──
function openPopup(item){
  popupItem=item;popupTemp=null;popupOpts=[];popupQty=1;

  document.getElementById('popupTitle').textContent=item.name;
  document.getElementById('popupBasePrice').textContent='기본 '+item.price.toLocaleString()+'원';

  const tempSec=document.getElementById('tempSection');
  if(item.needTemp){
    tempSec.style.display='block';
    document.getElementById('btnHot').className='temp-btn';
    document.getElementById('btnIce').className='temp-btn';
  } else {
    tempSec.style.display='none';
    popupTemp=item.tempFixed;
  }

  // 옵션 — 카테고리별 허용 옵션만 표시 (catOptMap 없으면 전체 표시)
  const grid=document.getElementById('optGrid');
  grid.innerHTML='';
  const optSecLabel=document.querySelector('.sec-label:last-of-type');
  // 디저트는 옵션 없음
  if(item.cat==='디저트'){
    if(optSecLabel)optSecLabel.style.display='none';
  } else {
    if(optSecLabel)optSecLabel.style.display='';
    const allowedOpts=catOptMap&&catOptMap[item.cat];
    // catOptMap 미로드 또는 설정 없으면 전체 옵션 표시
    const useFilter=allowedOpts&&allowedOpts.length>0;
    optionDB.forEach((opt,i)=>{
      if(useFilter&&!allowedOpts.includes(opt.name))return;
      const btn=document.createElement('button');
      btn.className='opt-btn';
      btn.innerHTML=`<span class="opt-name">${opt.name}</span><span class="opt-price">+${opt.price.toLocaleString()}</span>`;
      btn.onclick=()=>toggleOpt(i,btn);
      grid.appendChild(btn);
    });
  }

  document.getElementById('popupQty').textContent=1;
  updatePopupBtn();
  document.getElementById('popupBg').classList.add('open');
}

function closePopup(){document.getElementById('popupBg').classList.remove('open');}

function selectTemp(t){
  popupTemp=t;
  document.getElementById('btnHot').className='temp-btn'+(t==='HOT'?' sel-hot':'');
  document.getElementById('btnIce').className='temp-btn'+(t==='ICE'?' sel-ice':'');
  updatePopupBtn();
}

function toggleOpt(i,btn){
  const idx=popupOpts.indexOf(i);
  if(idx>=0){popupOpts.splice(idx,1);btn.className='opt-btn';}
  else{popupOpts.push(i);btn.className='opt-btn sel';}
  updatePopupBtn();
}

function changeQty(d){
  popupQty=Math.max(1,popupQty+d);
  document.getElementById('popupQty').textContent=popupQty;
  updatePopupBtn();
}

function updatePopupBtn(){
  const btn=document.getElementById('popupAddBtn');
  const needTemp=popupItem&&popupItem.needTemp&&!popupTemp;
  if(needTemp){btn.disabled=true;btn.textContent='온도를 선택하세요';return;}
  const optTotal=popupOpts.reduce((s,i)=>s+optionDB[i].price,0);
  const total=(popupItem.price+optTotal)*popupQty;
  btn.disabled=false;
  btn.textContent=`담기 · ${total.toLocaleString()}원`;
}

function addToCart(){
  if(!popupItem)return;
  const optTotal=popupOpts.reduce((s,i)=>s+optionDB[i].price,0);
  const unitPrice=popupItem.price+optTotal;
  const opts=popupOpts.map(i=>optionDB[i]);
  const temp=popupTemp||popupItem.tempFixed;
  cart.push({
    id:Date.now(),
    name:popupItem.name,
    displayName:popupItem.name,
    temp,opts,qty:popupQty,unitPrice,
    cat:popupItem.cat
  });
  closePopup();
  renderCart();
  renderMenuArea(curCat);
}

// ── 장바구니 ──
function renderCart(){
  const wrap=document.getElementById('cartItems');
  if(cart.length===0){
    wrap.innerHTML='<div class="cart-empty">메뉴를 선택해 주세요</div>';
    document.getElementById('totalPrice').textContent='0원';
    document.getElementById('orderBtn').disabled=true;
    return;
  }
  wrap.innerHTML='';
  let total=0;
  cart.forEach((item,i)=>{
    total+=item.unitPrice*item.qty;
    const div=document.createElement('div');div.className='cart-item';
    const tempTag=item.temp?` <span style="font-size:9px;padding:1px 4px;border-radius:2px;${item.temp==='HOT'?'background:#FCEBEB;color:#A32D2D;':'background:#E6F1FB;color:#185FA5;'}">${item.temp}</span>`:'';
    const optStr=item.opts.length>0?'▶ '+item.opts.map(o=>o.name).join(', '):'';
    div.innerHTML=`
      <div class="ci-name">${item.displayName}${tempTag}</div>
      ${optStr?`<div class="ci-opt">${optStr}</div>`:''}
      <div class="ci-row">
        <span class="ci-qty-price">x${item.qty} · ${(item.unitPrice*item.qty).toLocaleString()}원</span>
        <button class="ci-del" onclick="removeCart(${i})">✕</button>
      </div>`;
    wrap.appendChild(div);
  });
  document.getElementById('totalPrice').textContent=total.toLocaleString()+'원';
  document.getElementById('orderBtn').disabled=curDeptIdx===null;
}

function removeCart(i){
  cart.splice(i,1);
  renderCart();
  renderMenuArea(curCat);
}

function clearCart(){
  cart=[];renderCart();renderMenuArea(curCat);
}

// ── 주문 완료 ──
function submitOrder(){
  if(cart.length===0||curDeptIdx===null)return;
  const dept=depts[curDeptIdx];
  // 비밀번호 설정된 부서는 모달로
  if(dept.password){
    openPwdModal();
    return;
  }
  doSubmitOrder();
}
function doSubmitOrder(){
  if(cart.length===0||curDeptIdx===null)return;
  const dept=depts[curDeptIdx];
  const di=curDeptIdx;
  orderCount++;
  const order={
    id:orderCount,
    deptName:dept.name,
    deptIdx:di,
    items:cart.map(c=>({
      name:c.name,
      displayName:c.displayName,
      temp:c.temp||null,
      opts:c.opts,
      qty:c.qty,
      unitPrice:c.unitPrice
    })),
    totalPrice:cart.reduce((s,c)=>s+c.unitPrice*c.qty,0),
    status:'pending',
    createdAt:Date.now()
  };

  // Firebase에 주문 저장
  db.ref('orders/'+order.id).set(order);
  db.ref('orderCount').set(orderCount);

  // ── 장부 자동 기록 ──
  // Firebase에서 해당 부서의 rows를 직접 읽어서 업데이트
  // (depts 전체를 절대 덮어쓰지 않음 → 장부 삭제 내역 보존)
  const today=new Date();
  const dateStr=(today.getMonth()+1)+'/'+(today.getDate());
  const cartSnapshot=[...cart]; // 클리어 전에 복사

  db.ref('jangbu/depts/'+di+'/rows').once('value').then(snap=>{
    // Firebase 최신 rows 가져오기
    let rows=snap.val()||[];
    // Firebase가 객체로 저장한 경우 배열 변환
    if(!Array.isArray(rows))rows=Object.values(rows);
    // 80행 보장
    while(rows.length<80)rows.push({date:'',content:'',opts:[],order:'',pay:'',note:'',createdAt:'',updatedAt:''});

    cartSnapshot.forEach(item=>{
      const content=item.displayName+(item.temp?' ('+item.temp+')':'')+(item.opts.length>0?' +'+item.opts.map(o=>o.name).join('+'):'')+(item.qty>1?' x'+item.qty:'');
      const newRow={date:dateStr,content,opts:item.opts,order:item.unitPrice*item.qty,pay:'',note:'',createdAt:dateStr,updatedAt:dateStr,basePrice:item.unitPrice*item.qty};
      const emptyIdx=rows.findIndex(r=>!r.content&&!r.date&&!r.pay&&!r.order);
      if(emptyIdx>=0)rows[emptyIdx]=newRow;
      else rows.push(newRow);
    });

    // 해당 부서의 rows 경로만 업데이트 → 다른 부서/삭제내역 절대 안 건드림
    return db.ref('jangbu/depts/'+di+'/rows').set(rows);
  }).catch(err=>{
    console.error('장부 기록 실패:', err);
  });

  showToast(`#${orderCount} 주문 완료! KDS로 전송됐어요`);
  clearCart();
  // 주문 완료 후 도입화면으로
  setTimeout(()=>{
    curDeptIdx=null;
    document.getElementById('deptBtn').textContent='부서 선택 ▾';
    goIntro();
  },2000);
}

// ── 비밀번호 모달 ──
function openPwdModal(){
  pwdBuffer='';
  document.getElementById('pwdErr').textContent='';
  renderPwdDots();
  document.getElementById('pwdModal').classList.add('open');
}
function closePwdModal(){
  pwdBuffer='';
  document.getElementById('pwdModal').classList.remove('open');
}
function renderPwdDots(){
  const dept=depts[curDeptIdx];
  const maxLen=dept&&dept.password?dept.password.length:4;
  let h='';
  for(let i=0;i<maxLen;i++){
    h+=`<div class="pwd-dot${i<pwdBuffer.length?' filled':''}"></div>`;
  }
  document.getElementById('pwdDots').innerHTML=h;
}
function pwdInput(n){
  const dept=depts[curDeptIdx];
  const maxLen=dept&&dept.password?dept.password.length:4;
  if(pwdBuffer.length>=maxLen)return;
  pwdBuffer+=n;
  renderPwdDots();
  if(pwdBuffer.length>=maxLen)pwdConfirm();
}
function pwdDel(){
  pwdBuffer=pwdBuffer.slice(0,-1);
  renderPwdDots();
}
function pwdConfirm(){
  const dept=depts[curDeptIdx];
  if(!dept||!dept.password){closePwdModal();doSubmitOrder();return;}
  if(pwdBuffer===dept.password){
    closePwdModal();
    doSubmitOrder();
  } else {
    document.getElementById('pwdErr').textContent='비밀번호가 틀렸습니다';
    pwdBuffer='';
    renderPwdDots();
  }
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

}

function closeDeptModal(){document.getElementById('deptModal').classList.remove('open');}

function selectDept(i){
  curDeptIdx=i;
  document.getElementById('deptBtn').textContent=depts[i].name+' ▾';
  document.getElementById('orderBtn').disabled=cart.length===0;
  closeDeptModal();
  renderCart();
}

function pn(s){const n=parseInt(String(s||'').replace(/,/g,'').replace(/[^0-9\-]/g,''));return isNaN(n)?0:n;}

document.getElementById('popupBg').addEventListener('click',e=>{if(e.target===document.getElementById('popupBg'))closePopup();});
document.getElementById('deptModal').addEventListener('click',e=>{if(e.target===document.getElementById('deptModal'))closeDeptModal();});

loadData();
</script>
