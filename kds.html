<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEGA MGC COFFEE · KDS</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#FFFBE6;color:#2C2C2A;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* 탑바 */
.topbar{background:#F5C800;padding:0 14px;height:46px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #E0B800;flex-shrink:0;}
.top-logo{font-size:14px;font-weight:500;color:#111;}
.top-right{display:flex;gap:10px;align-items:center;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#3B6D11;}
.sync-dot.err{background:#E24B4A;}
.top-time{font-size:13px;color:#555;font-weight:500;}
.top-count{background:#111;color:#F5C800;font-size:12px;font-weight:500;padding:3px 12px;border-radius:20px;}

/* 주문 그리드 */
.order-grid{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:12px;overflow-y:auto;align-content:start;}
.order-grid::-webkit-scrollbar{width:4px;}
.order-grid::-webkit-scrollbar-thumb{background:#E8D84A;border-radius:2px;}

/* 주문 카드 */
.order-card{background:#fff;border:2px solid #E8D84A;border-radius:10px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.order-card.urgent{border-color:#E24B4A;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(226,75,74,0.3);}50%{box-shadow:0 0 0 6px rgba(226,75,74,0);}}
.order-card.done{opacity:0.4;border-color:#ddd;}

.card-head{background:#FFF9D6;padding:8px 10px;border-bottom:1.5px solid #E8D84A;display:flex;justify-content:space-between;align-items:flex-start;}
.card-head.urgent{background:#FCEBEB;border-bottom-color:#E24B4A;}
.card-head.done{background:#f5f5f5;border-bottom-color:#ddd;}
.order-no{font-size:10px;color:#888;margin-bottom:2px;}
.order-dept{font-size:13px;font-weight:500;color:#2C2C2A;}
.head-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
.order-time{font-size:10px;color:#888;}
.urgent-badge{font-size:9px;background:#E24B4A;color:#fff;padding:2px 6px;border-radius:3px;font-weight:500;}

.card-body{padding:8px 10px;flex:1;}
.menu-item{padding:5px 0;border-bottom:1px solid #FFF0CC;}
.menu-item:last-child{border-bottom:none;}
.menu-row{display:flex;justify-content:space-between;align-items:center;}
.menu-name{font-size:12px;font-weight:500;color:#2C2C2A;flex:1;}
.menu-qty{font-size:13px;font-weight:500;color:#111;margin-left:6px;white-space:nowrap;}
.tag{font-size:9px;font-weight:500;padding:1px 4px;border-radius:3px;margin-left:3px;vertical-align:middle;}
.tag-hot{background:#FCEBEB;color:#A32D2D;}
.tag-ice{background:#E6F1FB;color:#185FA5;}
.tag-mega{background:#F5C800;color:#111;}
.opt-row{margin-top:2px;display:flex;align-items:flex-start;gap:3px;}
.opt-arrow{color:#B8860B;font-size:10px;margin-top:1px;flex-shrink:0;}
.opt-text{font-size:10px;color:#888;line-height:1.4;}

.card-foot{padding:7px 10px;border-top:1px solid #F0E87A;}
.done-btn{width:100%;padding:8px;background:#F5C800;color:#111;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;}
.done-btn:active{background:#E0B800;}
.done-btn.completed{background:#eee;color:#aaa;cursor:default;}
.elapsed{font-size:10px;color:#888;text-align:center;margin-bottom:4px;}
.elapsed.warn{color:#E24B4A;font-weight:500;}

/* 빈 화면 */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#B8860B;gap:10px;}
.empty-icon{font-size:48px;}
.empty-text{font-size:14px;color:#888;}

/* 하단 바 */
.bottombar{background:#F5C800;padding:7px 14px;border-top:1px solid #E0B800;display:flex;gap:20px;align-items:center;flex-shrink:0;}
.stat{display:flex;align-items:center;gap:6px;}
.stat-label{font-size:11px;color:#555;}
.stat-val{font-size:13px;font-weight:500;color:#111;}
.stat-val.red{color:#A32D2D;}
.stat-val.green{color:#3B6D11;}

/* 완료 내역 토글 */
.show-done-btn{margin-left:auto;font-size:11px;padding:4px 10px;background:none;border:1px solid #111;border-radius:10px;cursor:pointer;color:#111;font-family:inherit;}
</style>
</head>
<body>

<div class="topbar">
  <span class="top-logo">MEGA MGC COFFEE · KDS</span>
  <div class="top-right">
    <span class="sync-dot" id="syncDot"></span>
    <span class="top-time" id="topTime"></span>
    <button onclick="playAlert()" style="background:none;border:1px solid #111;border-radius:10px;font-size:11px;padding:3px 8px;cursor:pointer;color:#111;">🔔 테스트</button>
    <span class="top-count" id="topCount">대기 0건</span>
  </div>
</div>

<div class="order-grid" id="orderGrid">
  <div class="empty-state" style="grid-column:1/-1;">
    <div class="empty-icon">☕</div>
    <div class="empty-text">주문을 기다리는 중...</div>
  </div>
</div>

<div class="bottombar">
  <div class="stat"><span class="stat-label">대기</span><span class="stat-val" id="statPending">0건</span></div>
  <div class="stat"><span class="stat-label">완료</span><span class="stat-val green" id="statDone">0건</span></div>
  <div class="stat"><span class="stat-label">5분초과</span><span class="stat-val red" id="statUrgent">0건</span></div>
  <button class="show-done-btn" onclick="toggleDone()">완료 내역 보기</button>
</div>

<script>
const firebaseConfig={
  apiKey:"AIzaSyBKvoTCTV0F1W9OukvbqbxLhMW6Y3jZmzc",
  authDomain:"cafe-jangbu.firebaseapp.com",
  projectId:"cafe-jangbu",
  storageBucket:"cafe-jangbu.firebasestorage.app",
  messagingSenderId:"570502999010",
  appId:"1:570502999010:web:207c71a8d8e77d8034a7bb",
  databaseURL:"https://cafe-jangbu-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let orders={};
let showDone=false;
let audioCtx=null;
let knownOrderIds=new Set(); // 이미 알림 울린 주문 ID

function getAudioCtx(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playAlert(){
  try{
    const ctx=getAudioCtx();
    // 딩동 — 두 음
    const notes=[{freq:880,start:0,dur:0.15},{freq:660,start:0.2,dur:0.25}];
    notes.forEach(n=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.type='sine';
      osc.frequency.setValueAtTime(n.freq,ctx.currentTime+n.start);
      gain.gain.setValueAtTime(0,ctx.currentTime+n.start);
      gain.gain.linearRampToValueAtTime(0.4,ctx.currentTime+n.start+0.01);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+n.start+n.dur);
      osc.start(ctx.currentTime+n.start);
      osc.stop(ctx.currentTime+n.start+n.dur+0.05);
    });
  }catch(e){console.warn('알림음 재생 실패:',e);}
}

// 시간 표시
function updateTime(){
  const now=new Date();
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  document.getElementById('topTime').textContent=h+':'+m;
}
setInterval(updateTime,1000);
updateTime();

// 경과 시간 계산
function getElapsed(createdAt){
  const sec=Math.floor((Date.now()-createdAt)/1000);
  if(sec<60)return sec+'초';
  return Math.floor(sec/60)+'분 '+( sec%60)+'초';
}
function isUrgent(createdAt){
  return (Date.now()-createdAt)>5*60*1000;
}

// Firebase 실시간 감지
function listenOrders(){
  db.ref('orders').on('value',snap=>{
    const newOrders=snap.val()||{};
    document.getElementById('syncDot').className='sync-dot';

    // 새 주문(pending) 감지 → 알림음
    let hasNew=false;
    Object.values(newOrders).forEach(o=>{
      if(o.status==='pending'&&!knownOrderIds.has(o.id)){
        knownOrderIds.add(o.id);
        hasNew=true;
      }
    });
    if(hasNew)playAlert();

    orders=newOrders;
    renderOrders();
  },()=>{
    document.getElementById('syncDot').className='sync-dot err';
  });
}

// 첫 클릭 시 AudioContext 활성화
document.addEventListener('click',()=>{
  if(!audioCtx){getAudioCtx();}
  else if(audioCtx.state==='suspended')audioCtx.resume();
},{once:false});

// 주문 완료 처리
function completeOrder(id){
  db.ref('orders/'+id+'/status').set('done');
}

// 태그 HTML
function tempTag(temp){
  if(!temp)return'';
  if(temp==='HOT')return'<span class="tag tag-hot">HOT</span>';
  if(temp==='ICE')return'<span class="tag tag-ice">ICE</span>';
  return'';
}
function isMega(name){return /메가|왕/.test(name);}

// 렌더
function renderOrders(){
  const grid=document.getElementById('orderGrid');
  grid.innerHTML='';

  const list=Object.values(orders)
    .filter(o=>showDone||o.status==='pending')
    .sort((a,b)=>a.createdAt-b.createdAt);

  const pending=Object.values(orders).filter(o=>o.status==='pending');
  const done=Object.values(orders).filter(o=>o.status==='done');
  const urgent=pending.filter(o=>isUrgent(o.createdAt));

  document.getElementById('topCount').textContent='대기 '+pending.length+'건';
  document.getElementById('statPending').textContent=pending.length+'건';
  document.getElementById('statDone').textContent=done.length+'건';
  document.getElementById('statUrgent').textContent=urgent.length+'건';

  if(list.length===0){
    grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1;">
      <div class="empty-icon">☕</div>
      <div class="empty-text">주문을 기다리는 중...</div>
    </div>`;
    return;
  }

  list.forEach(order=>{
    const isDone=order.status==='done';
    const urg=!isDone&&isUrgent(order.createdAt);
    const card=document.createElement('div');
    card.className='order-card'+(urg?' urgent':isDone?' done':'');

    // 헤더
    const headCls='card-head'+(urg?' urgent':isDone?' done':'');
    const time=new Date(order.createdAt);
    const timeStr=String(time.getHours()).padStart(2,'0')+':'+String(time.getMinutes()).padStart(2,'0');
    card.innerHTML=`
      <div class="${headCls}">
        <div>
          <div class="order-no">#${String(order.id).padStart(3,'0')}</div>
          <div class="order-dept">${esc(order.deptName)}</div>
        </div>
        <div class="head-right">
          ${urg?'<span class="urgent-badge">⚠ 5분초과</span>':''}
          <span class="order-time">${timeStr}</span>
          <span style="font-size:10px;padding:1px 5px;border-radius:3px;background:${order.orderType==='take'?'#E6F1FB':'#EAF3DE'};color:${order.orderType==='take'?'#185FA5':'#3B6D11'};font-weight:500;">${order.orderType==='take'?'포장':'매장'}</span>
        </div>
      </div>`;

    // 바디
    const body=document.createElement('div');
    body.className='card-body';
    (order.items||[]).forEach(item=>{
      const mega=isMega(item.name);
      const optStr=(item.opts||[]).map(o=>o.name).join(', ');
      const div=document.createElement('div');
      div.className='menu-item';
      div.innerHTML=`
        <div class="menu-row">
          <span class="menu-name">${esc(item.displayName||item.name)}${mega?'<span class="tag tag-mega">MEGA</span>':''}${tempTag(item.temp)}</span>
          <span class="menu-qty">x${item.qty}</span>
        </div>
        ${optStr?`<div class="opt-row"><span class="opt-arrow">▶</span><span class="opt-text">${esc(optStr)}</span></div>`:''}`;
      body.appendChild(div);
    });
    card.appendChild(body);

    // 푸터
    const foot=document.createElement('div');foot.className='card-foot';
    if(!isDone){
      const elapsed=document.createElement('div');
      elapsed.className='elapsed'+(urg?' warn':'');
      elapsed.textContent=getElapsed(order.createdAt);
      foot.appendChild(elapsed);
    }
    const btn=document.createElement('button');
    btn.className='done-btn'+(isDone?' completed':'');
    btn.textContent=isDone?'✓ 완료됨':'완료';
    if(!isDone)btn.onclick=()=>completeOrder(order.id);
    foot.appendChild(btn);
    card.appendChild(foot);

    grid.appendChild(card);
  });
}

// 경과시간 1초마다 갱신
setInterval(()=>{
  document.querySelectorAll('.elapsed').forEach(el=>{
    const card=el.closest('.order-card');
    if(!card||card.classList.contains('done'))return;
    const id=card.querySelector('.order-no')?.textContent?.replace('#','');
    if(!id)return;
    const order=Object.values(orders).find(o=>String(o.id).padStart(3,'0')===id);
    if(!order)return;
    const urg=isUrgent(order.createdAt);
    el.textContent=getElapsed(order.createdAt);
    el.className='elapsed'+(urg?' warn':'');
    if(urg){card.className='order-card urgent';}
  });
},1000);

function toggleDone(){
  showDone=!showDone;
  document.querySelector('.show-done-btn').textContent=showDone?'완료 내역 숨기기':'완료 내역 보기';
  renderOrders();
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}

listenOrders();
</script>
</body>
</html>
